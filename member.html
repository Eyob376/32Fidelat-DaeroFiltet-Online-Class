<!-- PAGE CONTENT -->
<section class="member-wrapper">

    <h1 class="member-title">Member Login</h1>

    <div class="member-layout">

        <!-- LEFT SIDE: LOGIN FORM -->
        <div class="login-panel premium-glass">

            <h2 class="login-heading">Welcome Back</h2>
            <p class="login-subtext">Sign in to access your lessons, assignments, and progress.</p>

            <form id="loginForm">

                <div class="form-group">
                    <label for="loginRole">Select User Type</label>
                    <select id="loginRole" required>
                        <option value="">Select</option>
                        <option value="admin">Admin</option>
                        <option value="itdev">IT-Dev</option>
                        <option value="member">Member</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Email / Username</label>
                    <input type="text" id="loginEmail" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="glass-btn btn-primary">Sign In</button>
            </form>

            <p class="small-text">New here? <a href="register.html">Register your child</a></p>

            <details class="admin-credential-block">
                <summary>Admin Password Options</summary>
                <form id="adminCredentialForm" class="portal-form" autocomplete="off">
                    <input type="email" id="adminCredentialEmail" placeholder="Admin Email" required>
                    <div class="admin-password-input-wrap">
                        <input type="password" id="adminCurrentPassword" placeholder="Current Admin Password">
                        <button type="button" class="admin-password-visibility-toggle" data-target="adminCurrentPassword" aria-label="Show password">👁</button>
                    </div>
                    <div class="admin-password-input-wrap">
                        <input type="password" id="adminNewPassword" placeholder="New Admin Password" required>
                        <button type="button" class="admin-password-visibility-toggle" data-target="adminNewPassword" aria-label="Show password">👁</button>
                    </div>
                    <div class="admin-password-input-wrap">
                        <input type="password" id="adminConfirmPassword" placeholder="Confirm New Admin Password" required>
                        <button type="button" class="admin-password-visibility-toggle" data-target="adminConfirmPassword" aria-label="Show password">👁</button>
                    </div>
                    <input type="text" id="adminRecoveryUsername" placeholder="IT-Dev Username (for forgot password)">
                    <div class="admin-password-input-wrap">
                        <input type="password" id="adminRecoveryPassword" placeholder="IT-Dev Password (for forgot password)">
                        <button type="button" class="admin-password-visibility-toggle" data-target="adminRecoveryPassword" aria-label="Show password">👁</button>
                    </div>
                    <button type="submit" class="glass-btn btn-primary">Save Admin Password</button>
                </form>
                <p id="adminCredentialStatus" class="small-text"></p>
            </details>

        </div>

        <!-- RIGHT SIDE: CINEMATIC SLIDESHOW -->
        <div class="member-slideshow">
            <img src="assets/class1.png" class="member-slide active">
            <img src="assets/class2.png" class="member-slide">
            <img src="assets/class3.png" class="member-slide">
        </div>

    </div>

</section>
